<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			function showErr(msg) {
				const d = document.createElement('pre');
				d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:12px;z-index:99999;font-size:14px;white-space:pre-wrap;max-height:50vh;overflow:auto;';
				d.textContent = msg;
				document.body.prepend(d);
			}
			window.addEventListener('error', (e) => {
				showErr(e.message + '\n' + (e.filename || '') + ':' + (e.lineno || '') + '\n' + (e.error && e.error.stack || ''));
			});
			window.addEventListener('unhandledrejection', (e) => {
				const r = e.reason;
				showErr('Unhandled rejection: ' + r + '\n' + (r && r.stack || '') + '\n' + (r && r.message || ''));
			});
		</script>
	</body>
</html>
