<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Reasonance</title>
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			var __DEV__ = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
			function showErr(msg) {
				var d = document.createElement('pre');
				d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#991b1b;color:white;padding:12px;z-index:99999;font-size:14px;white-space:pre-wrap;max-height:50vh;overflow:auto;';
				d.textContent = msg;
				document.body.prepend(d);
			}
			window.addEventListener('error', function(e) {
				if (__DEV__) {
					showErr(e.message + '\n' + (e.filename || '') + ':' + (e.lineno || '') + '\n' + (e.error && e.error.stack || ''));
				} else {
					showErr('An unexpected error occurred. Please restart the application.');
				}
			});
			window.addEventListener('unhandledrejection', function(e) {
				if (__DEV__) {
					var r = e.reason;
					showErr('Unhandled rejection: ' + r + '\n' + (r && r.stack || '') + '\n' + (r && r.message || ''));
				} else {
					showErr('An unexpected error occurred. Please restart the application.');
				}
			});
		</script>
	</body>
</html>
