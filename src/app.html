<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Reasonance</title>
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<script>
			var __DEV__ = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
			function showErr(msg) {
				var d = document.createElement('pre');
				d.style.cssText = 'position:fixed;top:32px;left:0;right:0;background:#991b1b;color:white;padding:8px 32px 8px 12px;z-index:99999;font-size:13px;white-space:pre-wrap;max-height:40vh;overflow:auto;cursor:pointer;';
				d.textContent = msg;
				d.title = 'Click to dismiss';
				d.addEventListener('click', function() { d.remove(); });
				document.body.prepend(d);
			}
			window.addEventListener('error', function(e) {
				if (__DEV__) {
					showErr(e.message + '\n' + (e.filename || '') + ':' + (e.lineno || '') + '\n' + (e.error && e.error.stack || ''));
				} else {
					showErr('An unexpected error occurred. Please restart the application.');
				}
			});
			window.addEventListener('unhandledrejection', function(e) {
				if (__DEV__) {
					var r = e.reason;
					showErr('Unhandled rejection: ' + r + '\n' + (r && r.stack || '') + '\n' + (r && r.message || ''));
				} else {
					showErr('An unexpected error occurred. Please restart the application.');
				}
			});
		</script>
	</body>
</html>
