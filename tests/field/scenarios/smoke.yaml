# tests/field/scenarios/smoke.yaml
- id: smoke_01
  name: App startup
  suite: smoke
  steps:
    - action: wait_ready
      timeout: 30
    - action: checkpoint
      label: startup
    - action: assert_no_errors
    - action: snapshot_performance

- id: smoke_02
  name: Open project
  suite: smoke
  steps:
    - action: open_folder
      path: /home/uh1/VIBEPROJECTS/REASONANCE
    - action: wait_ms
      ms: 5000
    - action: checkpoint
      label: project_opened
    - action: assert_no_new_errors

- id: smoke_03
  name: Open file
  suite: smoke
  steps:
    - action: search_palette
    - action: type_text
      text: tauri.ts
    - action: wait_ms
      ms: 500
    - action: press_key
      combo: Return
    - action: wait_ms
      ms: 1000
    - action: checkpoint
      label: file_opened
    - action: assert_no_new_errors

- id: smoke_04
  name: Open terminal
  suite: smoke
  steps:
    - action: press_key
      combo: ctrl+grave
    - action: wait_ms
      ms: 2000
    - action: checkpoint
      label: terminal_opened
    - action: assert_no_new_errors

- id: smoke_05
  name: Open each panel
  suite: smoke
  steps:
    - action: toolbar_settings
    - action: checkpoint
      label: settings_panel
    - action: close_dialog
    - action: toolbar_analytics
    - action: checkpoint
      label: analytics_panel
    - action: toolbar_analytics
    - action: toolbar_memory
    - action: checkpoint
      label: memory_panel
    - action: toolbar_memory
    - action: toolbar_hive
    - action: checkpoint
      label: hive_panel
    - action: toolbar_hive
    - action: toolbar_git
    - action: checkpoint
      label: git_panel
    - action: toolbar_git
    - action: assert_no_new_errors

- id: smoke_06
  name: Theme switch
  suite: smoke
  steps:
    - action: toolbar_settings
    - action: screenshot
      name: settings_before_theme
    - action: close_dialog
    - action: screenshot
      name: settings_after_close
    - action: assert_no_new_errors

- id: smoke_07
  name: State persistence
  suite: smoke
  python_override: true
  steps: []
