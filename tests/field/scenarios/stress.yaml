# tests/field/scenarios/stress.yaml
- id: stress_26
  name: 50+ files open
  suite: stress
  python_override: true
  steps: []

- id: stress_27
  name: Large file tree
  suite: stress
  steps:
    - action: checkpoint
      label: large_tree_before_scroll
    - action: scroll_down
      amount: 20
    - action: wait_ms
      ms: 300
    - action: scroll_up
      amount: 20
    - action: checkpoint
      label: large_tree_after_scroll
    - action: assert_no_new_errors

- id: stress_28
  name: Large file in editor
  suite: stress
  python_override: true
  steps: []

- id: stress_29
  name: High-volume PTY output
  suite: stress
  steps:
    - action: checkpoint
      label: pty_high_volume
    - action: assert_no_new_errors

- id: stress_30
  name: Multiple concurrent agents
  suite: stress
  requires_llm: true
  steps:
    - action: checkpoint
      label: concurrent_agents

- id: stress_31
  name: Memory leak check
  suite: stress
  python_override: true
  steps: []

- id: stress_32
  name: Rapid UI interaction
  suite: stress
  python_override: true
  steps: []

- id: stress_33
