# tests/field/scenarios/e2e.yaml
- id: e2e_08
  name: File tree navigation
  suite: e2e
  steps:
    - action: click_relative
      x_pct: 0.10
      y_pct: 0.15
    - action: wait_ms
      ms: 500
    - action: scroll_down
      amount: 5
    - action: scroll_up
      amount: 5
    - action: checkpoint
      label: file_tree_navigation
    - action: assert_no_new_errors

