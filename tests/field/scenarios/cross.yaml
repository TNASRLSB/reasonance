# tests/field/scenarios/cross.yaml
- id: cross_45
  name: Edit triggers git status update
  suite: cross
  steps:
    - action: search_palette
    - action: type_text
      text: App.svelte
    - action: wait_ms
      ms: 500
    - action: press_key
      combo: Return
    - action: wait_ms
      ms: 1000
    - action: checkpoint
      label: before_edit
    - action: type_text
      text: " "
    - action: save_file
    - action: wait_ms
      ms: 1000
    - action: checkpoint
      label: after_save
    - action: undo
    - action: save_file
    - action: wait_ms
      ms: 500
    - action: checkpoint
      label: after_undo_save
    - action: assert_no_new_errors

- id: cross_46
  name: Delete file closes editor tab
  suite: cross
  steps:
    - action: checkpoint
      label: delete_file_tab
    - action: assert_no_new_errors

- id: cross_47
  name: Rename updates editor tab
  suite: cross
  steps:
    - action: checkpoint
      label: rename_tab
    - action: assert_no_new_errors

- id: cross_48
  name: Settings changes apply live
  suite: cross
