- id: cross_51
  name: Theme consistency across all components
  suite: cross
  steps:
    - action: toolbar_settings
    - action: wait_ms
      ms: 1000
    - action: screenshot
      name: theme_settings_open
    - action: close_dialog
    - action: checkpoint
      label: theme_dark
    - action: toolbar_analytics
    - action: screenshot
      name: theme_analytics_dark
    - action: toolbar_analytics
    - action: toolbar_git
    - action: screenshot
