# tests/field/scenarios/edge.yaml
- id: edge_34
  name: Binary file in editor
  suite: edge
  steps:
    - action: search_palette
    - action: type_text
      text: icon.png
    - action: wait_ms
      ms: 500
    - action: press_key
      combo: Return
    - action: wait_ms
      ms: 1000
    - action: checkpoint
      label: binary_file_opened
    - action: assert_no_new_errors

