[cli]
name = "codex"
binary = "codex"
programmatic_args = ["exec", "{prompt}", "--json"]
resume_args = ["exec", "{prompt}", "--json"]
version_command = ["codex", "--version"]
update_command = ["npm", "install", "-g", "@openai/codex@latest"]
api_key_env = "OPENAI_API_KEY"
permission_args = ["--full-auto"]
read_only_tools = ["Read", "Grep", "Glob"]
image_mode = "cli-flag"
image_arg = "--image"

[capabilities]
streaming = true
session_resume = false
tool_use = true
thinking = true
structured_output = true
diff_output = true

[retry]
max_retries = 3
backoff = { strategy = "exponential", base_ms = 1000, max_ms = 30000 }
retryable_codes = ["rate_limit", "server_error"]

[commands]
cancel = { method = "signal", signal = "SIGINT" }

[session]
session_id_path = "thread_id"

# --- Error rules (match first) ---

[[rules]]
name = "error_turn_failed"
when = 'type == "turn.failed"'
emit = "error"
[rules.mappings]
content = "error.message"
severity = "fatal"

[[rules]]
name = "error_stream"
when = 'type == "error" && exists(message)'
emit = "error"
[rules.mappings]
content = "message"
severity = "recoverable"

# --- Content rules ---

[[rules]]
name = "agent_message"
when = 'type == "item.completed" && item.type == "agent_message"'
emit = "text"
[rules.mappings]
content = "item.text"

[[rules]]
name = "reasoning"
when = 'type == "item.completed" && item.type == "reasoning"'
emit = "thinking"
[rules.mappings]
content = "item.text"

[[rules]]
name = "command_started"
when = 'type == "item.started" && item.type == "command_execution"'
emit = "tool_use"
[rules.mappings]
content = "item.command"
tool_name = "item.command"
parent_id = "item.id"

[[rules]]
name = "command_completed"
when = 'type == "item.completed" && item.type == "command_execution"'
emit = "tool_result"
[rules.mappings]
content = "item.aggregated_output"
parent_id = "item.id"

[[rules]]
name = "file_change"
when = 'type == "item.completed" && item.type == "file_change"'
emit = "tool_use"
[rules.mappings]
content = "item.changes[0].path"
tool_name = "item.type"
parent_id = "item.id"

[[rules]]
name = "mcp_tool_completed"
when = 'type == "item.completed" && item.type == "mcp_tool_call"'
emit = "tool_use"
[rules.mappings]
tool_name = "item.tool"
parent_id = "item.id"

[[rules]]
name = "item_error"
when = 'type == "item.completed" && item.type == "error"'
emit = "error"
[rules.mappings]
content = "item.message"
severity = "recoverable"

# --- Lifecycle rules ---

[[rules]]
name = "usage"
when = 'type == "turn.completed" && exists(usage)'
emit = "usage"
[rules.mappings]
input_tokens = "usage.input_tokens"
output_tokens = "usage.output_tokens"
cache_read_tokens = "usage.cached_input_tokens"

[[tests]]
name = "basic_text"
prompt = "Reply with exactly: REASONANCE_TEST_OK"
max_tokens = 50
expected = [
  { event_type = "text", required = true, validate = { type = "content_matches", pattern = "REASONANCE_TEST_OK" } },
]

[[tests]]
name = "reasoning"
prompt = "Think step by step: what is 2+2?"
max_tokens = 200
expected = [
  { event_type = "thinking", required = false, validate = "content_not_empty" },
]
