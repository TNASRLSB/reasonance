[cli]
name = "claude"
binary = "claude"
programmatic_args = ["-p", "{prompt}", "--output-format", "stream-json"]
resume_args = ["--resume", "{session_id}", "-p", "{prompt}", "--output-format", "stream-json"]
version_command = ["claude", "--version"]
update_command = ["claude", "update"]
api_key_env = "ANTHROPIC_API_KEY"

[capabilities]
streaming = true
session_resume = true
tool_use = true
thinking = true
structured_output = true
diff_output = true

[context]
mode = "flag"
flag = "--context"
file_format = "```{language}\n// {path}\n{content}\n```"
selection_format = "Selected in {file_path} (lines {start}-{end}):\n{content}"

[retry]
max_retries = 3
backoff = { strategy = "exponential", base_ms = 1000, max_ms = 30000 }
retryable_codes = ["overloaded", "rate_limit", "timeout"]

[commands]
cancel = { method = "signal", signal = "SIGINT" }
pause = false
interrupt = { method = "stdin", format = "\n{message}\n" }

[session]
session_id_path = "message.id"
model_path = "message.model"

[[rules]]
name = "text_chunk"
when = 'type == "content_block_delta" && delta.type == "text_delta"'
emit = "text"

[rules.mappings]
content = "delta.text"

[[rules]]
name = "thinking"
when = 'type == "content_block_delta" && delta.type == "thinking_delta"'
emit = "thinking"

[rules.mappings]
content = "delta.thinking"

[[rules]]
name = "tool_start"
when = 'type == "content_block_start" && content_block.type == "tool_use"'
emit = "tool_use"

[rules.mappings]
content = "content_block.input"
tool_name = "content_block.name"
parent_id = "content_block.id"

[[rules]]
name = "tool_input_delta"
when = 'type == "content_block_delta" && delta.type == "input_json_delta"'
emit = "tool_use"

[rules.mappings]
content = "delta.partial_json"

[[rules]]
name = "block_stop"
when = 'type == "content_block_stop"'
emit = "status"

[[rules]]
name = "error_rate_limit"
when = 'type == "error" && error.type == "overloaded"'
emit = "error"

[rules.mappings]
content = "error.message"
error_code = "error.type"
severity = "recoverable"

[[rules]]
name = "error_generic"
when = 'type == "error"'
emit = "error"

[rules.mappings]
content = "error.message"
error_code = "error.type"
severity = "fatal"

[[rules]]
name = "usage"
when = 'type == "message_delta" && exists(usage)'
emit = "usage"

[rules.mappings]
input_tokens = "usage.input_tokens"
output_tokens = "usage.output_tokens"

[[rules]]
name = "done"
when = 'type == "message_stop"'
emit = "done"

[[rules]]
name = "result_metrics"
when = 'type == "result"'
emit = "usage"
# NOTE: Do NOT map input_tokens/output_tokens here — they are already
# counted from the message_delta usage rule. Mapping them again would double-count.

[rules.mappings]
cache_creation_tokens = "usage.cache_creation_input_tokens"
cache_read_tokens = "usage.cache_read_input_tokens"
duration_ms = "duration_ms"
duration_api_ms = "duration_api_ms"
num_turns = "num_turns"
stop_reason = "stop_reason"
total_cost_usd = "total_cost_usd"

[[tests]]
name = "basic_text"
prompt = "Reply with exactly: REASONANCE_TEST_OK"
max_tokens = 50
expected = [
  { event_type = "text", required = true, validate = { type = "content_matches", pattern = "REASONANCE_TEST_OK" } },
  { event_type = "done", required = true, validate = "exists" },
]

[[tests]]
name = "thinking"
prompt = "Think step by step: what is 2+2?"
max_tokens = 200
expected = [
  { event_type = "thinking", required = false, validate = "content_not_empty" },
]
