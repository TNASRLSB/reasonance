[cli]
name = "claude"
binary = "claude"
programmatic_args = ["-p", "{prompt}", "--output-format", "stream-json", "--verbose"]
resume_args = ["--resume", "{session_id}", "-p", "{prompt}", "--output-format", "stream-json", "--verbose"]
version_command = ["claude", "--version"]
update_command = ["claude", "update"]
api_key_env = "ANTHROPIC_API_KEY"
permission_args = ["--dangerously-skip-permissions"]
allowed_tools_arg = "--allowedTools"
read_only_tools = ["Read", "Grep", "Glob", "WebSearch", "WebFetch"]
image_mode = "stdin-json"
image_args_template = ["--output-format", "stream-json", "--verbose"]

[capabilities]
streaming = true
session_resume = true
tool_use = true
thinking = true
structured_output = true
diff_output = true

[context]
mode = "flag"
flag = "--context"
file_format = "```{language}\n// {path}\n{content}\n```"
selection_format = "Selected in {file_path} (lines {start}-{end}):\n{content}"

[retry]
max_retries = 3
backoff = { strategy = "exponential", base_ms = 1000, max_ms = 30000 }
retryable_codes = ["overloaded", "rate_limit", "timeout"]

[commands]
cancel = { method = "signal", signal = "SIGINT" }
pause = false
interrupt = { method = "stdin", format = "\n{message}\n" }

[session]
session_id_path = "session_id"
model_path = "message.model"

# --- Claude CLI stream-json format rules ---
# The CLI outputs: type="assistant" (response), type="result" (final), type="system" (hooks/init)

[[rules]]
name = "assistant_content"
when = 'type == "assistant" && exists(message.content)'
emit = "text"
content_blocks = "message.content"

[rules.mappings]
model = "message.model"

[[rules]]
name = "error_generic"
when = 'type == "error"'
emit = "error"

[rules.mappings]
content = "message"
error_code = "code"
severity = "fatal"

[[rules]]
name = "permission_denial"
when = 'type == "result" && exists(permission_denials)'
emit = "permission_denial"

[rules.mappings]
denials = "permission_denials"

[[rules]]
name = "usage"
when = 'type == "result" && exists(usage)'
emit = "usage"

[rules.mappings]
input_tokens = "usage.input_tokens"
output_tokens = "usage.output_tokens"
cache_creation_tokens = "usage.cache_creation_input_tokens"
cache_read_tokens = "usage.cache_read_input_tokens"
duration_ms = "duration_ms"
duration_api_ms = "duration_api_ms"
num_turns = "num_turns"
stop_reason = "stop_reason"
total_cost_usd = "total_cost_usd"

[[tests]]
name = "basic_text"
prompt = "Reply with exactly: REASONANCE_TEST_OK"
max_tokens = 50
expected = [
  { event_type = "text", required = true, validate = { type = "content_matches", pattern = "REASONANCE_TEST_OK" } },
]

[[tests]]
name = "thinking"
prompt = "Think step by step: what is 2+2?"
max_tokens = 200
expected = [
  { event_type = "thinking", required = false, validate = "content_not_empty" },
]
